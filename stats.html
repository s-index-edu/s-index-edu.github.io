<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Statistics — S-Index</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/styles.css">
    <script src="static/js/theme.js"></script>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">S-Index</a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Search</a>
                <a href="graph.html" class="nav-link">Graph</a>
                <a href="matrix.html" class="nav-link">Adjacency Matrix</a>
                <a href="survey.html" class="nav-link">Survey</a>
                <a href="stats.html" class="nav-link active">Statistics</a>
                <a href="https://github.com/s-index-edu/s-index-edu.github.io" class="nav-link nav-link-external" target="_blank" rel="noopener">GitHub</a>
                <a href="https://github.com/s-index-edu/s-index-edu.github.io/discussions/1" class="nav-link nav-link-external" target="_blank" rel="noopener">Discussion</a>
            </nav>
            <div class="theme-wrap">
                <label for="themeSelect" class="sr-only">Theme</label>
                <select id="themeSelect" class="theme-select" aria-label="Choose theme">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="system">System</option>
                </select>
            </div>
            <button type="button" class="menu-btn" aria-label="Open menu" hidden></button>
        </div>
    </header>

    <main class="page-content">
        <div class="panel stats-page-panel">
            <h1 class="page-heading">Site Statistics</h1>

            <div class="stats-dashboard" id="statsDashboard">
                <iframe
                    id="gcFrame"
                    src="https://s-index.goatcounter.com"
                    title="GoatCounter dashboard"
                    style="width: 100%; min-height: calc(100vh - 160px); border: none; border-radius: 8px; background: #fff;"
                    loading="lazy"
                ></iframe>
                <p style="margin-top: 0.75rem; font-size: 0.875rem; opacity: 0.7;">
                    GoatCounter uses its own light theme inside the iframe.
                    <a href="https://s-index.goatcounter.com" target="_blank" rel="noopener">Open full dashboard in a new tab ↗</a>
                </p>
            </div>

            <noscript>
                <p>
                    JavaScript is disabled. You can view the statistics directly at
                    <a href="https://s-index.goatcounter.com">s-index.goatcounter.com</a>.
                </p>
            </noscript>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>S-Index — Conference publication metrics. <a href="https://github.com/s-index-edu/s-index-edu.github.io">Source on GitHub</a>.</p>
        </div>
    </footer>

    <script>
        // Mobile nav
        (function () {
            var menuBtn = document.querySelector(".menu-btn");
            var nav = document.querySelector(".nav");
            if (menuBtn && nav) {
                menuBtn.removeAttribute("hidden");
                menuBtn.addEventListener("click", function () {
                    nav.classList.toggle("is-open");
                    menuBtn.setAttribute("aria-expanded", nav.classList.contains("is-open"));
                });
            }
        })();
    </script>

    <script data-goatcounter="https://s-index.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
</html>
