<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Index Graph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/styles.css">
    <script src="static/js/theme.js"></script>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">S-Index</a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Search</a>
                <a href="graph.html" class="nav-link active">Graph</a>
                <a href="matrix.html" class="nav-link">Adjacency Matrix</a>
                <a href="survey.html" class="nav-link">Survey</a>
                <a href="stats.html" class="nav-link">Statistics</a>
                <a href="https://github.com/s-index-edu/s-index-edu.github.io" class="nav-link nav-link-external" target="_blank" rel="noopener">GitHub</a>
                <a href="https://github.com/s-index-edu/s-index-edu.github.io/discussions/1" class="nav-link nav-link-external" target="_blank" rel="noopener">Discussion</a>
            </nav>
            <div class="theme-wrap">
                <label for="themeSelect" class="sr-only">Theme</label>
                <select id="themeSelect" class="theme-select" aria-label="Choose theme">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="system">System</option>
                </select>
            </div>
            <button type="button" class="menu-btn" aria-label="Open menu" hidden></button>
        </div>
    </header>

    <main class="graph-page">
        <div class="graph-toolbar">
            <div class="graph-toolbar-left">
                <label for="graphYearSelect" class="toolbar-label">Year</label>
                <select id="graphYearSelect" class="year-select" aria-label="Select graph year">
                    <option value="">Loading…</option>
                </select>
            </div>
            <p class="graph-hint">Nodes represent conferences. Edges connect conferences that share frequent authors. Click a node to highlight its neighbourhood.</p>
        </div>
        <div class="graph-frame-wrap">
            <iframe id="graphFrame" class="graph-iframe" title="S-Index conference graph" frameborder="0">
                Your browser does not support iframes.
            </iframe>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>S-Index — Conference publication metrics. <a href="https://github.com/s-index-edu/s-index-edu.github.io">Source on GitHub</a>.</p>
        </div>
    </footer>

    <script>
        (function () {
            var CONF_URL = "static/config/datasets.json";

            function loadConfig(cb) {
                fetch(CONF_URL)
                    .then(function (r) { if (!r.ok) throw new Error("Config load failed"); return r.json(); })
                    .then(cb)
                    .catch(function (err) {
                        console.error(err);
                        document.getElementById("graphYearSelect").innerHTML = '<option value="">No data</option>';
                    });
            }

            function setGraph(path) {
                var frame = document.getElementById("graphFrame");
                frame.src = path;
            }

            loadConfig(function (config) {
                var datasets = config.datasets || [];
                var defaultYear = config.defaultYear != null ? String(config.defaultYear) : null;
                var sel = document.getElementById("graphYearSelect");
                sel.innerHTML = "";
                datasets.forEach(function (d) {
                    if (!d.graph) return;
                    var opt = document.createElement("option");
                    opt.value = d.graph;
                    opt.textContent = d.year;
                    if (String(d.year) === defaultYear) opt.selected = true;
                    sel.appendChild(opt);
                });
                if (!sel.options.length) {
                    sel.innerHTML = '<option value="">No graphs configured</option>';
                    return;
                }
                if (!sel.value) sel.selectedIndex = 0;
                setGraph(sel.value);

                sel.addEventListener("change", function () {
                    if (sel.value) setGraph(sel.value);
                });
            });

            // Mobile nav
            var menuBtn = document.querySelector(".menu-btn");
            var nav = document.querySelector(".nav");
            if (menuBtn && nav) {
                menuBtn.removeAttribute("hidden");
                menuBtn.addEventListener("click", function () {
                    nav.classList.toggle("is-open");
                    menuBtn.setAttribute("aria-expanded", nav.classList.contains("is-open"));
                });
            }
        })();
    </script>
    <script data-goatcounter="https://s-index.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
</html>
